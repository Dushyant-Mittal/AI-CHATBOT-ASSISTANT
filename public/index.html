<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Q&A Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🤖 AI Q&A Assistant</h1>
      <button id="resetBtn" class="reset-btn">New Chat</button>
    </header>

    <main class="chat-window" id="chatWindow">
      <div class="message bot">
        <div class="bubble">Hi! I'm your AI assistant. Ask me anything to get started.</div>
      </div>
    </main>

    <form id="chatForm" class="chat-form">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your question..."
        autocomplete="off"
        required
      />
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
